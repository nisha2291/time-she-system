<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Varsity Time Scheduling</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Varsity Time Scheduling</h1>
    </header>
    <main>
        <!-- Input Courses -->
        <section class="form-section">
            <h2>Input Courses</h2>
            <form id="courseForm">
                <div class="form-group">
                    <label for="course-name">Course Name:</label>
                    <input type="text" id="course-name" placeholder="Enter course name" required>
                </div>
                <div class="form-group">
                    <label for="teacher-name">Teacher Name:</label>
                    <input type="text" id="teacher-name" placeholder="Enter teacher name" required>
                </div>
                <button type="button" id="addCourseBtn" class="btn">Add Course</button>
            </form>
            <ul id="courseList"></ul>
        </section>

        <!-- Input Time Slots -->
        <section class="form-section">
            <h2>Input Time Slots</h2>
            <form id="timeSlotForm">
                <div class="form-group">
                    <label for="day">Day:</label>
                    <select id="day" required>
                        <option value="Monday">Monday</option>
                        <option value="Tuesday">Tuesday</option>
                        <option value="Wednesday">Wednesday</option>
                        <option value="Thursday">Thursday</option>
                        <option value="Friday">Friday</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="start-time">Start Time:</label>
                    <input type="time" id="start-time" required>
                </div>
                <div class="form-group">
                    <label for="end-time">End Time:</label>
                    <input type="time" id="end-time" required>
                </div>
                <button type="button" id="addTimeSlotBtn" class="btn">Add Time Slot</button>
            </form>
            <ul id="timeSlotList"></ul>
        </section>

        <!-- Generate Timetable -->
        <section class="form-section">
            <h2>Generate Timetable</h2>
            <button type="button" id="generateScheduleBtn" class="btn">Generate Schedule</button>
            <table id="scheduleTable" hidden>
                <thead>
                    <tr>
                        <th>Course</th>
                        <th>Teacher</th>
                        <th>Day</th>
                        <th>Start Time</th>
                        <th>End Time</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
