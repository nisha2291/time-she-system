<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Varsity Time Scheduling</title>
    <link rel="stylesheet" href="{% static 'scheduler/style.css' %}">
</head>
<body>
    <header>
        <h1>Varsity Time Scheduling</h1>
    </header>
    <main>
        <section class="form-section">
            <h2>Input Courses</h2>
            <form method="POST" action="{% url 'add_courses' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label for="course-name">Course Name:</label>
                    <input type="text" id="course-name" name="course_name" required>
                </div>
                <div class="form-group">
                    <label for="teacher-name">Teacher Name:</label>
                    <input type="text" id="teacher-name" name="teacher_name" required>
                </div>
                <button type="submit" class="btn">Add Course</button>
            </form>
        </section>

        <section class="form-section">
            <h2>Input Time Slots</h2>
            <form method="POST" action="{% url 'add_time_slots' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label for="day">Day:</label>
                    <select id="day" name="day" required>
                        <option value="Monday">Monday</option>
                        <option value="Tuesday">Tuesday</option>
                        <option value="Wednesday">Wednesday</option>
                        <option value="Thursday">Thursday</option>
                        <option value="Friday">Friday</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="start-time">Start Time:</label>
                    <input type="time" id="start-time" name="start_time" required>
                </div>
                <div class="form-group">
                    <label for="end-time">End Time:</label>
                    <input type="time" id="end-time" name="end_time" required>
                </div>
                <button type="submit" class="btn">Add Time Slot</button>
            </form>
        </section>

        <section class="form-section">
            <h2>Generate Timetable</h2>
            <a href="{% url 'schedule' %}" class="btn">Generate Schedule</a>
        </section>
    </main>
</body>
</html>
